  const pngPath = lang === 'bn' ? "Brand%20Assets/EquiSaaS%20BD%20Logo%20Bangla.png" : "Brand%20Assets/EquiSaaS%20BD%20Logo.png";
  
  return (
    <img 
      src={svgPath} 
      onError={(e) => { 
        // Prevents infinite loop crash if the PNG also fails to load
        e.currentTarget.onerror = null; 
        e.currentTarget.src = pngPath; 
      }}
      alt="EquiSaaS BD Logo" 
      className={`${className} w-auto object-contain transition-transform hover:scale-105 duration-300`}
    />
  );
};

            <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-blue via-brand-green to-brand-blue"></div>
            <div className="container mx-auto px-6 max-w-6xl">
              <h2 className="text-3xl md:text-4xl font-black text-center mb-16">{text.strategy.title}</h2>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                {text.strategy.cards.map((card, idx) => (
                  <div key={idx} className="bg-slate-800 p-8 rounded-[2rem] border border-slate-700 hover:border-brand-green hover:-translate-y-2 transition-all duration-300 shadow-xl hover:shadow-2xl hover:shadow-brand-green/10 group">
                    <div className="w-16 h-16 bg-slate-700/50 rounded-2xl flex items-center justify-center mb-8 group-hover:bg-brand-green group-hover:text-slate-900 transition-colors border border-slate-600 group-hover:border-transparent transform group-hover:rotate-6">
                      {idx === 0 ? <ShieldCheck className="w-8 h-8" /> : idx === 1 ? <Rocket className="w-8 h-8" /> : <Users className="w-8 h-8" />}
                    </div>
                    <h3 className="text-2xl font-bold mb-4">{card.title}</h3>
                    <p className="text-slate-400 leading-relaxed text-lg">{card.desc}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Departments Section */}
          <section id="departments" className="py-24 bg-slate-50">
            <div className="container mx-auto px-6 max-w-6xl">
              <div className="text-center max-w-3xl mx-auto mb-16">
                <h2 className="text-4xl font-black text-slate-900 mb-6">{text.deptSection.title}</h2>
                <p className="text-lg text-slate-600">{text.deptSection.desc}</p>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                {departments.map((dept) => {
                  const Icon = dept.icon;
                  // Color maps for dynamic tailwind classes
                  const colorMaps = {
                    blue: "bg-white text-blue-600 border-blue-100 hover:border-blue-400 shadow-lg shadow-blue-900/5 hover:shadow-blue-900/10",
                    emerald: "bg-white text-emerald-600 border-emerald-100 hover:border-emerald-400 shadow-lg shadow-emerald-900/5 hover:shadow-emerald-900/10",
                    amber: "bg-white text-amber-600 border-amber-100 hover:border-amber-400 shadow-lg shadow-amber-900/5 hover:shadow-amber-900/10",
                    purple: "bg-white text-purple-600 border-purple-100 hover:border-purple-400 shadow-lg shadow-purple-900/5 hover:shadow-purple-900/10",
                  };
                  const iconBgMap = {
                    blue: "bg-blue-50 text-blue-600", emerald: "bg-emerald-50 text-emerald-600", amber: "bg-amber-50 text-amber-600", purple: "bg-purple-50 text-purple-600"
                  }

                  return (
                    <div 
                      key={dept.id}
                      onClick={() => setSelectedDept(dept)}
                      className={`cursor-pointer rounded-[2rem] p-8 md:p-10 border-2 hover:-translate-y-2 transition-all duration-300 group relative overflow-hidden ${colorMaps[dept.color]}`}

                        <Icon className="w-full h-full" />
                      </div>
                      <div className={`w-16 h-16 rounded-2xl flex items-center justify-center mb-8 shadow-inner ${iconBgMap[dept.color]}`}>

                      </div>
                      <h3 className="text-2xl md:text-3xl font-black text-slate-900 mb-4 group-hover:text-brand-blue transition-colors">
                        {lang === 'bn' ? dept.titleBn : dept.titleEn}
                      </h3>
                      <p className="text-slate-600 mb-8 line-clamp-2 text-lg">
                        {lang === 'bn' ? dept.descBn : dept.descEn}
                      </p>
                      <div className="flex items-center text-sm font-bold uppercase tracking-wider text-slate-400 group-hover:text-brand-blue transition-colors">
                        {lang === 'bn' ? 'রোডম্যাপ দেখুন' : 'Explore Roadmap'} <ArrowRight className="w-5 h-5 ml-2 transform group-hover:translate-x-2 transition-transform" />
                      </div>
                    </div>
                  );

            </div>
          </section>


          {/* Phase 2 Section */}

                <span className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-slate-900 text-white text-sm font-semibold">

                </span>
                <h2 className="text-3xl md:text-4xl font-black text-slate-900 mt-6 mb-4">{text.phase2.title}</h2>
                <p className="text-lg text-slate-600">{text.phase2.desc}</p>
              </div>

              <div className="flex flex-wrap justify-center gap-3 mb-10">
                {phase2Tabs.map((tab) => (
                  <button
                    key={tab.id}
                    onClick={() => setPhase2Tab(tab.id)}
                    className={`px-5 py-2.5 rounded-full text-sm font-bold border transition-all ${
                      phase2Tab === tab.id
                        ? 'bg-slate-900 text-white border-slate-900 shadow-lg'
                        : 'bg-white text-slate-700 border-slate-200 hover:border-slate-400'
                    }`}
                  >
                    {lang === 'bn' ? tab.labelBn : tab.labelEn}
                  </button>
                ))}
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                {activePhase2.items.map((item, idx) => {

                  return (
                    <div key={idx} className="bg-white rounded-3xl p-6 border border-slate-100 shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all">

                        <Icon className="w-6 h-6" />
                      </div>
                      <h3 className="text-lg font-bold text-slate-900 mb-2">{lang === 'bn' ? item.titleBn : item.titleEn}</h3>

                  onClick={() => document.getElementById('departments').scrollIntoView({ behavior: 'smooth' })}

                <button
                  onClick={() => window.location.href = '/lms'}
                  className="bg-white text-slate-700 px-6 py-3 rounded-full font-bold border border-slate-200 hover:border-brand-blue hover:text-brand-blue transition-all"
                >
                  {text.nav.lms}
                </button>
              </div>
            </div>
          </section>\n          {/* How It Works Section */}

            <h2 className="text-3xl md:text-4xl font-black text-slate-800 text-center mb-16 relative inline-block left-1/2 -translate-x-1/2">

            </h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 px-6 max-w-7xl mx-auto relative">

              {(text.howItWorks?.steps || []).map((step, idx) => (
                <div key={idx} className="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-xl shadow-slate-200/40 hover:shadow-2xl hover:shadow-brand-blue/10 hover:-translate-y-2 transition-all duration-300 text-center group relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-blue to-brand-green transform origin-left scale-x-0 group-hover:scale-x-100 transition-transform duration-500"></div>
                  <div className="w-20 h-20 bg-gradient-to-br from-blue-50 to-slate-50 text-brand-blue rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:from-brand-blue group-hover:to-blue-700 group-hover:text-white transition-all shadow-inner border border-blue-100/50 group-hover:border-transparent transform group-hover:rotate-6">
                    <span className="text-3xl font-black">{idx + 1}</span>
                  </div>
                  <h3 className="text-xl font-bold text-slate-800 mb-3">{step.title}</h3>
                  <p className="text-slate-600 leading-relaxed">{step.desc}</p>
                </div>
              ))}
            </div>
          </section>

          {/* FAQ Section */}
          <section className="mb-32 px-6 max-w-4xl mx-auto">
            <h2 className="text-3xl md:text-4xl font-black text-slate-800 text-center mb-16 relative inline-block left-1/2 -translate-x-1/2">
              {text.faq?.title}
              <div className="h-3 w-full bg-brand-green/20 absolute bottom-1 left-0 -z-10 rounded-full transform -skew-x-12"></div>
            </h2>
            <div className="space-y-6">
              {(text.faq?.items || []).map((faq, idx) => (
                <div key={idx} className="bg-white p-6 md:p-8 rounded-[2rem] border border-slate-100 shadow-lg shadow-slate-200/30 hover:shadow-xl hover:shadow-brand-blue/5 hover:border-brand-blue/30 transition-all duration-300 group">
                  <h3 className="text-lg md:text-xl font-bold text-slate-800 flex gap-4 items-start group-hover:text-brand-blue transition-colors">
                    <div className="bg-blue-50 p-2.5 rounded-xl text-brand-blue mt-0.5 group-hover:bg-brand-blue group-hover:text-white transition-colors">
                      <HelpCircle className="w-6 h-6" />
                    </div>
                    <span className="mt-1.5 leading-snug">{faq.q}</span>
                  </h3>
                  <p className="text-slate-600 mt-4 md:pl-16 pl-14 leading-relaxed text-lg">{faq.a}</p>
                </div>
              ))}
            </div>
          </section>
        </main>
      ) : (

        <main className="flex-grow bg-slate-50 pb-24">
          {/* Header Banner */}
          <div className="bg-slate-900 text-white pt-12 pb-24 px-6 relative">
            <div className="container mx-auto max-w-6xl">
              <button 
                onClick={() => setSelectedDept(null)}
                className="flex items-center text-slate-300 hover:text-white mb-8 group bg-slate-800 px-5 py-2.5 rounded-full w-fit transition-colors shadow-md"
              >
                <ChevronRight className="w-5 h-5 rotate-180 mr-2 group-hover:-translate-x-1 transition-transform" /> 
                {text.profile.btnBack}

              <div className="flex items-center gap-6">
                <div className="w-20 h-20 bg-brand-blue rounded-2xl flex items-center justify-center shadow-xl border border-blue-400/20">
                  <SelectedDeptIcon className="w-10 h-10 text-white" />
                </div>
                <div>
                  <h1 className="text-3xl md:text-5xl font-black mb-3">
                    {lang === 'bn' ? selectedDept.titleBn : selectedDept.titleEn}
                  </h1>
                  <p className="text-slate-400 text-lg max-w-2xl">
                    {lang === 'bn' ? selectedDept.descBn : selectedDept.descEn}
                  </p>
                </div>
              </div>
            </div>
          </div>

          <div className="container mx-auto max-w-6xl px-6 -mt-12">
            <div className="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
              <div className="pt-20 md:pt-20 border-b border-slate-100 bg-slate-50/50">
                <h2 className="text-2xl md:text-3xl font-black text-slate-800 flex items-center gap-3">
                  <Target className="w-8 h-8 text-brand-blue" />
                  {text.profile.subDeptTitle}
                </h2>
              </div>
              
              <div className="p-8 md:p-10">
                <div className="mb-10 flex items-center gap-3 text-xs md:text-sm font-bold uppercase tracking-widest text-slate-500">
                  <span className="h-2 w-2 rounded-full bg-brand-green"></span>
                  {text.profile.roadmapTitle}
                </div>
                {selectedDept.roles.map((role, idx) => (
                  <div key={role.id} className={`mb-20 last:mb-0 ${idx !== 0 ? 'pt-16 border-t border-slate-200' : ''}`}>
                    <h3 className="text-2xl md:text-3xl font-bold text-brand-blue mb-10 flex items-center gap-4">
                      <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-lg shadow-sm">
                        {idx + 1}
                      </div>
                      {lang === 'bn' ? role.titleBn : role.titleEn}
                    </h3>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 mb-12">
                      {role.roadmap.map((phase, pIdx) => (
                        <div key={pIdx} className="bg-white rounded-3xl p-8 h-full flex flex-col border border-slate-100 shadow-xl shadow-slate-200/40 hover:border-brand-green/50 hover:shadow-2xl hover:shadow-brand-green/10 transition-all duration-300 relative overflow-hidden group">
                          <div className="absolute top-0 right-0 w-24 h-24 bg-brand-green/5 rounded-bl-[100px] -z-10 group-hover:scale-125 transition-transform duration-500"></div>
                          <h4 className="font-black text-slate-800 mb-6 pb-4 border-b border-slate-100 text-xl flex items-center gap-3">
                            <span className="w-2 h-8 bg-brand-green rounded-full"></span>
                            {lang === 'bn' ? phase.phaseBn : phase.phaseEn}
                          </h4>
                          <ul className="space-y-4">
                            {(lang === 'bn' ? phase.itemsBn : phase.itemsEn).map((item, iIdx) => (
                              <li key={iIdx} className="flex items-start gap-3 text-slate-600 font-medium">
                                <div className="mt-1 bg-green-50 p-1 rounded-md text-brand-green flex-shrink-0">
                                  <CheckCircle2 className="w-4 h-4" />
                                </div>
                                <span className="leading-relaxed">{item}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      ))}
                    </div>

                    <div className="bg-gradient-to-br from-blue-50 to-slate-50 rounded-[2rem] p-8 md:p-10 border border-blue-100/50 shadow-inner">
                      <h4 className="font-bold text-slate-800 mb-8 flex items-center gap-3 text-xl md:text-2xl">
                        <div className="bg-brand-blue text-white p-2.5 rounded-xl shadow-md">
                          <BookOpen className="w-6 h-6" />
                        </div>
                        {text.profile.resourceTitle}
                      </h4>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                        {role.resources.map((res, rIdx) => (
                          <a 
                            key={rIdx} 
                            href={res.url} 
                            target="_blank" 
                            rel="noopener noreferrer"
                            className="flex items-center justify-between p-5 md:p-6 rounded-2xl bg-white border border-slate-100 hover:border-brand-blue hover:shadow-xl hover:shadow-brand-blue/10 hover:-translate-y-1 transition-all duration-300 group"
                          >
                            <div className="flex items-center gap-4">
                              <div className="bg-slate-50 p-3 rounded-xl group-hover:bg-blue-50 transition-colors border border-slate-100 group-hover:border-blue-100">
                                <Link className="w-5 h-5 text-slate-400 group-hover:text-brand-blue" />
                              </div>
                              <span className="font-bold text-slate-700 group-hover:text-brand-blue text-base md:text-lg">{res.name}</span>
                            </div>
                            <ChevronRight className="w-6 h-6 text-slate-300 group-hover:text-brand-blue transform group-hover:translate-x-1 transition-transform" />
                          </a>
                        ))}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </main>
      )}

      {/* Global Footer */}
      <footer className="bg-slate-900 text-slate-300 py-12 border-t border-slate-800">
        <div className="container mx-auto px-6 max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-8 text-center md:text-left">
          <div>
            <div className="flex items-center justify-center md:justify-start gap-3 mb-6">
              <BrandLogo lang={lang} className="h-12 brightness-0 invert" />
            </div>
            <p className="text-sm text-slate-400 mb-6 leading-relaxed max-w-sm mx-auto md:mx-0">
              Equal Ownership, One Vision. Building real SaaS products for the Bangladesh market. Join the movement.
            </p>
          </div>
          <div>
            <h4 className="text-white font-bold mb-5 uppercase tracking-wide text-sm">Quick Links</h4>
            <div className="flex flex-col gap-3">
              <a href="https://docs.google.com/forms/d/e/1FAIpQLSeSoaRqc1wvHR-OXJh-jKFkDilxddAzog6YCP0KisGGrNBKpw/viewform?usp=dialog" target="_blank" rel="noopener noreferrer" className="hover:text-brand-blue transition-colors w-fit mx-auto md:mx-0 block md:inline-block" aria-label="Apply Now">
                {lang === 'bn' ? 'এপ্লাই করুন' : 'Apply Now'}
              </a>
              <button onClick={() => window.location.href = '/lms'} className="hover:text-brand-blue transition-colors text-left w-fit mx-auto md:mx-0 block md:inline-block" aria-label="LMS Portal">
                {lang === 'bn' ? 'LMS পোর্টাল' : 'LMS Portal'}
              </button>
            </div>
          </div>
          <div>
            <h4 className="text-white font-bold mb-5 uppercase tracking-wide text-sm">Connect With Us</h4>
            <a href="https://www.facebook.com/EquiSaaSBD/" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-slate-800 hover:bg-brand-blue px-5 py-3 rounded-xl text-white transition-colors shadow-md hover:shadow-lg w-fit mx-auto md:mx-0">
              <Facebook className="w-5 h-5" /> Facebook Page
            </a>
          </div>
        </div>
        <div className="mt-12 pt-8 border-t border-slate-800 text-center text-sm text-slate-500">
          &copy; {new Date().getFullYear()} EquiSaaS BD. All rights reserved.
        </div>
      </footer>
      
      {/* Mobile LMS Sticky Button */}
      <div className="md:hidden fixed bottom-6 left-6 right-6 z-40">
        <button 
          onClick={() => window.location.href = '/lms'}
          className="w-full flex justify-center items-center gap-2 bg-gradient-to-r from-brand-blue to-brand-green text-white px-6 py-4 rounded-2xl font-bold shadow-2xl shadow-blue-900/20 active:scale-95 transition-transform"
        >
          <GraduationCap className="w-6 h-6" /> {text.nav.lms}
        </button>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);
    </script>
