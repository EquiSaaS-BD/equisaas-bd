                              <input name="titleEn" placeholder={text.labels.lessonTitleEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-3" required />
                              <input name="order" placeholder={text.labels.order} type="number" className="bg-white border border-slate-200 rounded-2xl px-4 py-3" required />
                              <button className="md:col-span-2 bg-brand-green text-slate-900 font-semibold px-4 py-3 rounded-2xl flex items-center gap-2">
                                <Plus className="w-4 h-4" /> {text.actions.addLesson}
                              </button>
                            </form>

                            <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                              <div className="flex items-center justify-between">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.lessonOrder}</div>
                                <div className="text-xs text-slate-600">
                                  {adminCourseId ? `${adminLessons.length} ${text.labels.lessonCount}` : ""}
                                </div>
                              </div>
                              {adminCourseId ? (
                                adminLessons.length ? (
                                  <div className="mt-3 space-y-2">
                                    {adminLessons.map((lesson, idx) => (
                                      <div key={lesson.id} className="flex items-center justify-between gap-3 p-3 rounded-2xl border border-slate-200 bg-white">
                                        <div>
                                          <div className="text-sm font-semibold">{getLessonTitle(lesson)}</div>
                                          <div className="text-xs text-slate-600">
                                            {text.labels.order}: {lesson.order ?? idx + 1}
                                          </div>
                                        </div>
                                        <div className="flex items-center gap-2">
                                          <button
                                            type="button"
                                            onClick={() => moveLesson(adminCourseId, idx, -1)}
                                            disabled={idx === 0}
                                            aria-label={text.actions.moveUp}
                                            className={`p-2 rounded-full border ${idx === 0 ? "border-slate-200 text-slate-400" : "border-slate-300 text-slate-700 hover:text-slate-900"}`}
                                          >
                                            <ChevronUp className="w-4 h-4" />
                                          </button>
                                          <button
                                            type="button"
                                            onClick={() => moveLesson(adminCourseId, idx, 1)}
                                            disabled={idx === adminLessons.length - 1}
                                            aria-label={text.actions.moveDown}
                                            className={`p-2 rounded-full border ${idx === adminLessons.length - 1 ? "border-slate-200 text-slate-400" : "border-slate-300 text-slate-700 hover:text-slate-900"}`}
                                          >
                                            <ChevronDown className="w-4 h-4" />
                                          </button>
                                        </div>
                                      </div>
                                    ))}
                                  </div>
                                ) : (
                                  <p className="text-sm text-slate-600 mt-3">{text.labels.noLessons}</p>
                                )
                              ) : (
                                <p className="text-sm text-slate-600 mt-3">{text.labels.selectCourseManage}</p>
                              )}
                            </div>
                          </div>
                        )}
                        {adminTab === "roadmap" && (
                          <div className="space-y-6">
                            <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                              <div className="p-4 rounded-2xl border border-slate-200 bg-slate-50 space-y-2">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.selectDept}</div>
                                <select
                                  value={adminDeptId}
                                  onChange={(e) => setAdminDeptId(e.target.value)}
                                  className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-2"
                                >
                                  {visibleDepartments.map((dept) => (
                                    <option key={dept.id} value={dept.id}>
                                      {getLocalized(dept, "title")}
                                    </option>
                                  ))}
                                </select>
                              </div>
                              <div className="p-4 rounded-2xl border border-slate-200 bg-slate-50 space-y-2">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.selectSubdept}</div>
                                <select
                                  value={adminSubdeptId}
                                  onChange={(e) => setAdminSubdeptId(e.target.value)}
                                  className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-2"
                                >
                                  {(DEPARTMENTS.find((dept) => dept.id === adminDeptId)?.subdepartments || []).map((sub) => (
                                    <option key={sub.id} value={sub.id}>
                                      {getLocalized(sub, "title")}
                                    </option>
                                  ))}
                                </select>
                              </div>
                              <div className="p-4 rounded-2xl border border-slate-200 bg-slate-50 space-y-2">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.selectPath}</div>
                                <select
                                  value={adminPathId}
                                  onChange={(e) => setAdminPathId(e.target.value)}
                                  className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-2"
                                >
                                  {(adminPaths || []).map((path) => (
                                    <option key={path.id} value={path.id}>
                                      {getPathTitle(path)}
                                    </option>
                                  ))}
                                </select>
                              </div>
                              <div className="p-4 rounded-2xl border border-slate-200 bg-slate-50 space-y-2">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.modules}</div>
                                <select
                                  value={adminModuleId}
                                  onChange={(e) => setAdminModuleId(e.target.value)}
                                  className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-2"
                                >
                                  {(adminModules || []).map((module) => (
                                    <option key={module.id} value={module.id}>
                                      {getModuleTitle(module)}
                                    </option>
                                  ))}
                                </select>
                              </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
                              <form onSubmit={addPathToRoadmap} className="p-4 rounded-2xl border border-slate-200 bg-white space-y-3">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.actions.addPath}</div>
                                <input name="titleBn" placeholder={text.labels.pathTitleBn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <input name="titleEn" placeholder={text.labels.pathTitleEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <textarea name="descBn" placeholder={text.labels.pathDescBn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required></textarea>
                                <textarea name="descEn" placeholder={text.labels.pathDescEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required></textarea>
                                <input name="level" placeholder={text.labels.level} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <input name="lang" placeholder={text.labels.language} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <input name="duration" placeholder={text.labels.duration} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <button className="bg-brand-blue text-white font-semibold px-4 py-2 rounded-2xl">
                                  {text.actions.addPath}
                                </button>
                              </form>
                              <form onSubmit={addModuleToRoadmap} className="p-4 rounded-2xl border border-slate-200 bg-white space-y-3">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.actions.addModule}</div>
                                <input name="titleBn" placeholder={text.labels.moduleTitleBn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <input name="titleEn" placeholder={text.labels.moduleTitleEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <textarea name="summaryBn" placeholder={text.labels.moduleSummaryBn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required></textarea>
                                <textarea name="summaryEn" placeholder={text.labels.moduleSummaryEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required></textarea>
                                <input name="duration" placeholder={text.labels.duration} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <button className="bg-brand-blue text-white font-semibold px-4 py-2 rounded-2xl">
                                  {text.actions.addModule}
                                </button>
                              </form>
                              <form onSubmit={addLessonToModule} className="p-4 rounded-2xl border border-slate-200 bg-white space-y-3">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.actions.addLesson}</div>
                                <input name="titleBn" placeholder={text.labels.lessonTitleBn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <input name="titleEn" placeholder={text.labels.lessonTitleEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <select name="type" className="bg-white border border-slate-200 rounded-2xl px-4 py-2">
                                  <option value="Video">Video</option>
                                  <option value="Resource">Resource</option>
                                </select>
                                <input name="duration" placeholder={text.labels.duration} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <input name="videoUrl" placeholder={text.labels.videoUrl} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <input name="resourceUrl" placeholder={text.labels.resourceUrl} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <button className="bg-brand-blue text-white font-semibold px-4 py-2 rounded-2xl">
                                  {text.actions.addLesson}
                                </button>
                              </form>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                              <form onSubmit={addMonthlyItem} className="p-4 rounded-2xl border border-slate-200 bg-white space-y-3">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.actions.addMonthly}</div>
                                <input name="month" type="month" placeholder={text.labels.month} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <input name="programTitleBn" placeholder={text.labels.programTitleBn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <input name="programTitleEn" placeholder={text.labels.programTitleEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <input name="itemTitleBn" placeholder={text.labels.itemTitleBn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <input name="itemTitleEn" placeholder={text.labels.itemTitleEn} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" required />
                                <select name="type" className="bg-white border border-slate-200 rounded-2xl px-4 py-2">
                                  <option value="Video">Video</option>
                                  <option value="Resource">Resource</option>
                                </select>
                                <input name="url" placeholder={text.labels.link} className="bg-white border border-slate-200 rounded-2xl px-4 py-2" />
                                <button className="bg-brand-blue text-white font-semibold px-4 py-2 rounded-2xl">
                                  {text.actions.addItem}
                                </button>
                              </form>
                              <div className="p-4 rounded-2xl border border-slate-200 bg-white space-y-3">
                                <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.monthlyActivities}</div>
                                <div className="space-y-3">
                                  {(adminRoadmap.monthlyActivities || []).map((activity) => (
                                    <div key={activity.id} className="p-3 rounded-2xl bg-slate-50 border border-slate-200">
                                      <div className="text-sm font-semibold">{formatMonth(activity.month)}</div>
                                      <div className="text-xs text-slate-600">{getLocalized(activity, "title")}</div>
                                      <div className="mt-2 space-y-2">
                                        {(activity.items || []).map((item) => (
                                          <div key={item.id} className="flex items-center justify-between text-xs">
                                            <div className="flex items-center gap-2 text-slate-700">
                                              <span>{getLocalized(item, "title")}</span>
                                              {item.url && (
                                                <a href={item.url} target="_blank" rel="noreferrer" className="text-brand-blue underline">{text.labels.openLink}</a>
                                              )}
                                            </div>
                                            <button onClick={() => removeMonthlyItem(activity.id, item.id)} className="text-rose-600">{text.actions.remove}</button>
                                          </div>
                                        ))}
                                      </div>
                                    </div>
                                  ))}
                                  {!adminRoadmap.monthlyActivities?.length && (
                                    <p className="text-sm text-slate-600">{text.labels.empty}</p>
                                  )}
                                </div>
                              </div>
                            </div>

                            <div className="p-4 rounded-2xl border border-slate-200 bg-white space-y-4">
                              <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.roadmapOverview}</div>
                              <div className="space-y-4">
                                {(adminPaths || []).map((path) => (
                                  <div key={path.id} className="p-4 rounded-2xl border border-slate-200 bg-slate-50">
                                    <div className="flex items-start justify-between gap-3">
                                      <div>
                                        <div className="font-semibold">{getPathTitle(path)}</div>
                                        <div className="text-xs text-slate-600">{getLevelLabel(path.level)} · {path.lang} · {path.duration}</div>
                                      </div>
                                    </div>
                                    <div className="mt-3 space-y-3">
                                      {(path.modules || []).map((module) => (
                                        <div key={module.id} className="p-3 rounded-2xl border border-slate-200 bg-white">
                                          <div className="flex items-start justify-between gap-3">
                                            <div>
                                              <div className="font-semibold text-sm">{getModuleTitle(module)}</div>
                                              <div className="text-xs text-slate-600">{module.duration}</div>
                                            </div>
                                            <button onClick={() => removeModuleFromRoadmap(path.id, module.id)} className="text-xs text-rose-600">{text.actions.remove}</button>
                                          </div>
                                          <div className="mt-2 space-y-2">
                                            {(module.lessons || []).map((lesson) => (
                                              <div key={lesson.id} className="flex items-center justify-between text-xs">
                                                <span className="text-slate-700">{getLessonTitle(lesson)}</span>
                                                <div className="flex items-center gap-2">
                                                  {renderLessonLinks(lesson)}
                                                  <button onClick={() => removeLessonFromModule(path.id, module.id, lesson.id)} className="text-rose-600">{text.actions.remove}</button>
                                                </div>
                                              </div>
                                            ))}
                                            {!module.lessons?.length && (
                                              <p className="text-xs text-slate-600">{text.labels.noLessons}</p>
                                            )}
                                          </div>
                                        </div>
                                      ))}
                                      {!path.modules?.length && (
                                        <p className="text-xs text-slate-600">{text.labels.noModules}</p>
                                      )}
                                    </div>
                                  </div>
                                ))}
                                {!adminPaths.length && (
                                  <p className="text-sm text-slate-600">{text.labels.noModules}</p>
                                )}
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      <p className="text-sm text-slate-600 mt-4">Admin access required.</p>
                    )}
                  </section>
                )}
              </main>
            </div>
          </div>

          <nav className="fixed bottom-4 left-1/2 -translate-x-1/2 lg:hidden glass rounded-full px-4 py-2 flex gap-2">
            {visibleNavItems.map((item) => {
              const Icon = item.icon;
              const active = view === item.id;
              return (
                <button
                  key={item.id}
                  onClick={() => {
                    setView(item.id);
                    setSelectedCourse(null);
                  }}
                  className={`p-3 rounded-full ${active ? "bg-brand-blue text-white" : "text-slate-600 hover:text-slate-900"}`}
                >
                  <Icon className="w-4 h-4" />
                </button>
              );
            })}
          </nav>

          {showTrackModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="glass rounded-3xl p-6 w-full max-w-2xl">
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <h3 className="text-lg font-bold">{text.labels.chooseTrackTitle}</h3>
                    <p className="text-sm text-slate-600 mt-1">{text.labels.chooseTrackDesc}</p>
                  </div>
                  <button onClick={() => setShowTrackModal(false)} className="text-slate-500">
                    <X className="w-4 h-4" />
                  </button>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-5">
                  <div>
                    <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.selectDept}</div>
                    <select
                      value={trackDeptId}
                      onChange={(e) => {
                        const nextDeptId = e.target.value;
                        const dept = DEPARTMENTS.find((item) => item.id === nextDeptId) || DEPARTMENTS[0];
                        const sub = dept?.subdepartments?.[0];
                        const roadmap = getRoadmapForSubdept(sub?.id);
                        const nextPath = roadmap.paths?.[0];
                        setTrackDeptId(nextDeptId);
                        setTrackSubdeptId(sub?.id || "");
                        setTrackPathId(nextPath?.id || "");
                      }}
                      className="mt-2 w-full bg-white border border-slate-200 rounded-2xl px-4 py-3"
                    >
                      {DEPARTMENTS.map((dept) => (
                        <option key={dept.id} value={dept.id}>
                          {getLocalized(dept, "title")}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.selectSubdept}</div>
                    <select
                      value={trackSubdeptId}
                      onChange={(e) => {
                        const nextSubId = e.target.value;
                        const roadmap = getRoadmapForSubdept(nextSubId);
                        const nextPath = roadmap.paths?.[0];
                        setTrackSubdeptId(nextSubId);
                        setTrackPathId(nextPath?.id || "");
                      }}
                      className="mt-2 w-full bg-white border border-slate-200 rounded-2xl px-4 py-3"
                    >
                      {(trackSubdepartments || []).map((sub) => (
                        <option key={sub.id} value={sub.id}>
                          {getLocalized(sub, "title")}
                        </option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <div className="text-xs uppercase tracking-[0.2em] text-slate-500">{text.labels.selectPath}</div>
                    <select
                      value={trackPathId}
                      onChange={(e) => setTrackPathId(e.target.value)}
                      className="mt-2 w-full bg-white border border-slate-200 rounded-2xl px-4 py-3"
                    >
                      {(trackPaths || []).map((path) => (
                        <option key={path.id} value={path.id}>
                          {getPathTitle(path)}
                        </option>
                      ))}
                    </select>
                  </div>
                </div>

                <div className="mt-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                  <div className="text-sm text-slate-600">
                    {text.labels.yourTrack}: <span className="font-semibold text-slate-900">{getLocalized(trackDept, "title")} · {getLocalized(trackSubdept, "title")}</span>
                  </div>
                  <button
                    onClick={() => saveTrackSelection(trackDeptId, trackSubdeptId, trackPathId)}
                    className="px-5 py-2.5 rounded-full bg-brand-blue text-white font-semibold"
                  >
                    {text.actions.saveTrack}
                  </button>
                </div>
              </div>
            </div>
          )}
          {showAuth && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="glass rounded-3xl p-6 w-full max-w-md">
                <div className="flex items-center justify-between mb-4">
                  <h3 className="text-lg font-bold">{authMode === "signin" ? text.actions.signIn : "Create Account"}</h3>
                  <button onClick={() => setShowAuth(false)} className="text-slate-600">
                    <X className="w-4 h-4" />
                  </button>
                </div>
                <div className="space-y-3">
                  <input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="Email" className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3" />
                  <input value={password} type="password" onChange={(e) => setPassword(e.target.value)} placeholder="Password" className="w-full bg-white border border-slate-200 rounded-2xl px-4 py-3" />
                  <button onClick={handleEmail} className="w-full bg-brand-green text-slate-900 font-semibold px-4 py-3 rounded-2xl">
                    {authMode === "signin" ? text.actions.signIn : "Create Account"}
                  </button>
                  <button onClick={handleGoogle} className="w-full border border-slate-200 px-4 py-3 rounded-2xl">
                    Sign in with Google
                  </button>
                  <button onClick={() => setAuthMode(authMode === "signin" ? "signup" : "signin")} className="text-xs text-slate-600">
                    {authMode === "signin" ? "No account? Create one" : "Have an account? Sign in"}
                  </button>
                </div>
              </div>
            </div>
          )}

          {toast && (
            <div className="fixed top-6 right-6 bg-white border border-slate-200 px-4 py-2 rounded-full text-sm">
              {toast}
            </div>
          )}
        </div>
      );
    };

    const root = createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
